name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --locked --tests -- -D warnings

      - name: Lint (codesigned)
        run: cargo clippy --locked --tests --features codesigned -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Save cache
        if: github.event_name == 'push'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
