name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            codesign: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            codesign: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            codesign: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-release-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-release-${{ matrix.target }}-

      - name: Build (codesigned)
        if: matrix.codesign
        run: cargo build --locked --release --features codesigned --target ${{ matrix.target }}

      - name: Build
        if: ${{ !matrix.codesign }}
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Save cache
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-release-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}

      - name: Codesign
        if: matrix.codesign
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          KEYCHAIN="build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          echo "$CERTIFICATE_P12" | base64 -d > certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import certificate.p12 -k "$KEYCHAIN" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

          codesign --force --options runtime --sign "$IDENTITY" "target/${{ matrix.target }}/release/statusline"
          codesign --verify --verbose "target/${{ matrix.target }}/release/statusline"

      - name: Package
        run: tar czf "statusline-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" statusline

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ github.ref_name }}" "statusline-${{ matrix.target }}.tar.gz"

      - name: Cleanup signing artifacts
        if: always() && matrix.codesign
        run: |
          rm -f certificate.p12
          security delete-keychain build.keychain-db 2>/dev/null || true

  tap:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern 'statusline-*.tar.gz' \
            --dir dist

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="${GITHUB_REPOSITORY}"
          TAG="${GITHUB_REF_NAME}"

          sha() { shasum -a 256 "dist/statusline-$1.tar.gz" | awk '{print $1}'; }
          SHA_DARWIN_ARM="$(sha aarch64-apple-darwin)"
          SHA_LINUX_ARM="$(sha aarch64-unknown-linux-gnu)"
          SHA_LINUX_AMD="$(sha x86_64-unknown-linux-gnu)"

          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          cat > formula.rb <<RUBY
          class Statusline < Formula
            desc "Claude Code statusline with usage tracking"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE}/statusline-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_DARWIN_ARM}"
              end
            end

            on_linux do
              on_arm do
                url "${BASE}/statusline-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              end
              on_intel do
                url "${BASE}/statusline-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_AMD}"
              end
            end

            def install
              bin.install "statusline"
            end
          end
          RUBY

          TAP_REPO="${GITHUB_REPOSITORY_OWNER}/homebrew-tap"
          EXISTING_SHA=$(gh api "repos/${TAP_REPO}/contents/Formula/statusline.rb" --jq .sha 2>/dev/null || echo "")

          ARGS=(
            --method PUT
            --field "message=statusline ${VERSION}"
            --field "content=$(base64 -w0 formula.rb)"
          )
          if [ -n "$EXISTING_SHA" ]; then
            ARGS+=(--field "sha=${EXISTING_SHA}")
          fi

          gh api "repos/${TAP_REPO}/contents/Formula/statusline.rb" "${ARGS[@]}"
