name: Release

on:
  push:
    branches: [main]

jobs:
  release-plz:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install release-plz
        env:
          RELEASE_PLZ_VERSION: "0.3.157"
          RELEASE_PLZ_SHA256: "0006b843fd25e11b4aec073a6feb5e9b1be27702863504bef1432c39b795b52c"
        run: |
          curl -sSLf "https://github.com/release-plz/release-plz/releases/download/release-plz-v${RELEASE_PLZ_VERSION}/release-plz-aarch64-apple-darwin.tar.gz" -o release-plz.tar.gz
          echo "${RELEASE_PLZ_SHA256}  release-plz.tar.gz" | shasum -a 256 --check
          tar xzf release-plz.tar.gz
          mv release-plz /usr/local/bin/
          rm release-plz.tar.gz

      - name: Create or update release PR
        env:
          RELEASE_PLZ_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: release-plz release-pr --git-token "$RELEASE_PLZ_TOKEN"

      - name: Tag and release if PR was merged
        env:
          RELEASE_PLZ_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: release-plz release --git-token "$RELEASE_PLZ_TOKEN"
